server:
  port: ${SERVER_PORT:8082}

spring:
  datasource:
    url: ${STAGING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/iam_db}
    username: ${STAGING_DATASOURCE_USERNAME:root}
    password: ${STAGING_DATASOURCE_PASSWORD:root}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update

nats:
  url: ${STAGING_NATS_URL:nats://localhost:4222}
  username: ${STAGING_NATS_USERNAME:}
  password: ${STAGING_NATS_PASSWORD:}

eureka:
  client:
    service-url:
      defaultZone: ${STAGING_EUREKA_URL:http://localhost:8761/eureka/}
