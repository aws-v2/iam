name: Staging Deployment.

on:
  push:
    branches: [ "staging" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: qarani/iam-server:staging
        build-args: |
          SPRING_PROFILES_ACTIVE=staging

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey ${{ secrets.TAILSCALE_AUTH_KEY }}

      - name: Deploy to Staging via SSH over Tailscale
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USERNAME }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            docker pull qarani/iam-server:staging
            docker stop iam-server-staging || true
            docker rm iam-server-staging || true
            docker run -d --name iam-server-staging -p 8061:8061 \
              --network aws-staging-network \
              -e SPRING_PROFILES_ACTIVE=staging \
              -e SERVER_PORT=8061 \
              -e DATASOURCE_URL=jdbc:postgresql://postgres-staging:5432/iam_db \
              -e DATASOURCE_USERNAME=root \
              -e DATASOURCE_PASSWORD=root \
              -e JPA_SHOW_SQL=true \
              -e JWT_SECRET=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437 \
              -e JWT_EXPIRATION=86400000 \
              -e INSTANCE_TOKEN_SECRET=6A576E5A7234753778214125442A472D4B6150645367566B5970337336763979 \
              -e NATS_URL=nats://nats-staging:4222 \
              -e NATS_USERNAME=auth-server \
              -e NATS_PASSWORD=auth-secret \
              -e EUREKA_URL=http://discovery-server:8761/eureka/ \
              qarani/iam-server:staging