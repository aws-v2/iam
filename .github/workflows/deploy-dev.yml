name: Dev CI/CD

on:
  push:
    branches: [ "dev", "develop" ]
  pull_request:
    branches: [ "dev", "develop", "main", "staging" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build and Test with Maven
      run: ./mvnw clean package

    - name: Create Pull Request to Staging
      if: github.event_name == 'push' && (github.ref_name == 'dev' || github.ref_name == 'develop')
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh pr create \
          --base staging \
          --head ${{ github.ref_name }} \
          --title "Merge ${{ github.ref_name }} into staging" \
          --body "Automated PR created by GitHub Actions after successful CI on ${{ github.ref_name }}" \
          || echo "PR already exists or error occurred"

