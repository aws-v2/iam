name: Dev CI/CD

on:
  push:
    branches: [ "dev", "develop" ]
  pull_request:
    branches: [ "dev", "develop", "main", "staging" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'maven'

    - name: Build and Test with Maven
      run: ./mvnw clean package
