name: Dev CI

on:
  push:
    branches: [ "dev"]
  pull_request:
    branches: [ "dev"]

permissions:
  contents: write
  pull-requests: write

jobs:
  dev-test:
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Run tests
        run: mvn clean test

  dev-build:
    runs-on: ubuntu-latest
    needs: dev-test
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: qarani/iam-server:dev
          build-args: |
            SPRING_PROFILES_ACTIVE=dev
  

  open-pr-to-staging:
    needs: dev-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR dev → staging
        run: |
          # Check if PR already exists
          if gh pr list --base staging --head dev --state open --json number | jq -e 'length > 0' > /dev/null; then
            echo "PR already exists. Skipping..."
          else
            gh pr create \
              --base staging \
              --head dev \
              --title "chore: promote dev → staging" \
              --body "✅ All tests passed on dev. Auto-generated PR."
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_PAT}} 