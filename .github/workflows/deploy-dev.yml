name: Dev CI

on:
  push:
    branches: [ "dev" ]

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Run tests
        run: mvn clean

  open-pr-to-staging:
    needs: build-and-test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR dev → staging
        run: |
          # Check if PR already exists
          if gh pr list --base staging --head dev --state open --json number | jq -e 'length > 0' > /dev/null; then
            echo "PR already exists. Skipping..."
          else
            gh pr create \
              --base staging \
              --head dev \
              --title "chore: promote dev → staging" \
              --body "✅ All tests passed on dev. Auto-generated PR."
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_PAT}} 