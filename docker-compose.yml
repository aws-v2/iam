version: '3.8'
services:
  postgres:
    image: postgres:17
    container_name: sacco_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: iam_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  nats:
    image: nats:latest
    container_name: iam_nats
    command: [ "-js" ]
    ports:
      - "4222:4222"
      - "8222:8222"

volumes:
  postgres_data:
